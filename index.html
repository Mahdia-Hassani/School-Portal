<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Champion Academy</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation -->

    <nav>
      <div class="logo">Champion Academy</div>

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <!-- Hero -->

    <header class="hero">
      <h1>Welcome to Champion Academy</h1>

      <p>
        Empowering students through English and Computer Education in Kabul.
      </p>
    </header>

    <!-- Enrollment Form -->

    <section class="container">
      <h2>Student Enrollment Form</h2>

      <form id="enrollmentForm">
        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="studentName" />
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" id="studentAge" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="studentEmail" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="studentPhone" />
        </div>

        <div class="form-group">
          <label>Student Photo</label>
          <input type="file" id="studentPhoto" accept="image/*" />
        </div>

        <div class="form-group">
          <label>Grade Level</label>

          <select id="gradeLevel">
            <option value="">Select Grade</option>
            <option>Grade 10</option>
            <option>Grade 11</option>
            <option>Grade 12</option>
          </select>
        </div>

        <button type="submit" class="btn">Enroll Student</button>
      </form>

      <p id="message"></p>

      <div id="studentSummary"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
